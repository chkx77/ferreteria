<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ferretería PRO — Sistema de Gestión</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#dde0e8;--surface:#e8eaf0;--surface2:#dfe2ea;--surface3:#d4d8e2;
  --border:#c4c9d6;--border2:#b0b7c8;--border3:#959db2;
  --accent:#2f5ee8;--accent2:#1f4ecf;--accent-dim:rgba(47,94,232,.09);
  --text:#141820;--muted:#5a6275;--muted2:#8f98ac;
  --danger:#c42e2e;--success:#146640;--info:#0a6ba0;--purple:#5e42a8;
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;
  --r:6px;--r2:10px;--sidebar:228px
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}
#app{display:flex;height:100vh;overflow:hidden}
aside{width:var(--sidebar);min-width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-logo{padding:22px 20px 14px;border-bottom:1px solid var(--border)}
.sidebar-logo .brand{font-size:10px;color:var(--muted2);letter-spacing:.14em;text-transform:uppercase;font-family:var(--mono)}
.sidebar-logo .name{font-size:21px;font-weight:800;color:var(--accent);line-height:1.05;margin-top:3px;letter-spacing:-.03em}
.sidebar-logo .name span{color:var(--muted);font-weight:400}
nav{flex:1;padding:8px 0;overflow-y:auto}
.nav-section{padding:14px 20px 6px;font-size:10px;font-family:var(--mono);color:var(--muted2);letter-spacing:.12em;text-transform:uppercase}
nav a{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;border-left:2px solid transparent;transition:all .15s}
nav a:hover{color:var(--text);background:var(--surface2)}
nav a.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-dim)}
nav .nav-icon{width:15px;height:15px;opacity:.6;flex-shrink:0}
nav a.active .nav-icon{opacity:1}
.sidebar-footer{padding:14px 20px;border-top:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--muted2);line-height:1.8}
main{flex:1;overflow-y:auto;background:var(--bg)}
.page-header{padding:28px 36px 22px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.page-header h1{font-size:26px;font-weight:800;letter-spacing:-.03em}
.page-header .sub{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:4px;letter-spacing:.06em}
.header-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:var(--font);white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:var(--surface);color:var(--muted);border:1px solid var(--border2)}.btn-ghost:hover{color:var(--text);border-color:var(--border3);background:var(--surface2)}
.btn-success{background:transparent;color:var(--success);border:1px solid var(--success)}.btn-success:hover{background:var(--success);color:#fff}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}.btn-danger:hover{background:var(--danger);color:#fff}
.btn-info{background:transparent;color:var(--info);border:1px solid var(--info)}.btn-info:hover{background:var(--info);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px;border-radius:4px}
.toolbar{padding:14px 36px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface)}
.search-box{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px}
.search-box input{border:none;background:transparent;color:var(--text);font-size:13px;font-family:var(--font);outline:none;flex:1}
.search-box input::placeholder{color:var(--muted2)}
.table-wrap{padding:0 36px 36px;overflow-x:auto;background:var(--surface)}.table-wrap.pt{padding-top:20px}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:1px solid var(--border2)}
thead th{text-align:left;padding:11px 13px;font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:.08em;text-transform:uppercase;font-weight:400;white-space:nowrap;background:var(--surface2)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--accent-dim)}
tbody td{padding:11px 13px;font-size:13px}
.mono{font-family:var(--mono);font-size:12px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--mono);letter-spacing:.02em}
.badge-ok{background:#d4f0e2;color:#1a7a47}.badge-low{background:#fde8e8;color:#c42b2b}
.badge-warn{background:#fff3cd;color:#8a6200}.badge-info{background:#dbeeff;color:#0a6ea8}
.action-row{display:flex;gap:5px}
.modal-backdrop{position:fixed;inset:0;background:rgba(30,40,60,.35);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);width:500px;max-width:96vw;max-height:92vh;overflow-y:auto;padding:28px}
.modal-wide{width:640px}
.modal h2{font-size:17px;font-weight:700;margin-bottom:20px;letter-spacing:-.01em}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:18px;border-top:1px solid var(--border)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:10px;color:var(--muted);font-family:var(--mono);letter-spacing:.09em;text-transform:uppercase;margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border-radius:var(--r);background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);background:var(--surface)}
.form-group select option{background:#fff}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 14px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.stat-card{background:var(--surface);padding:20px 24px}
.s-label{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.s-val{font-size:24px;font-weight:800;letter-spacing:-.03em;margin-top:5px;line-height:1}
.s-sub{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:4px}
.s-trend{font-size:11px;font-family:var(--mono);margin-top:3px}
.trend-up{color:var(--success)}.trend-dn{color:var(--danger)}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.dash-panel{background:var(--surface);padding:24px 28px}
.dash-panel.full{grid-column:1/-1}
.dash-panel h3{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px}
.chart-wrap{position:relative;height:180px}
.alerta-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.alerta-item:last-child{border-bottom:none}
.top-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.top-item:last-child{border-bottom:none}
.top-bar-wrap{flex:1;margin:0 12px;height:4px;background:var(--surface3);border-radius:2px}
.top-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .4s}
.factura-section{padding:24px 36px;background:var(--bg)}
.factura-cliente{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px;margin-bottom:20px}
.factura-cliente-title{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.item-add-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px;margin-bottom:16px}
.item-add-bar-title{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.item-add-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.item-add-row .form-group{margin-bottom:0}
.factura-table-wrap{border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;background:var(--surface)}
.factura-totales{padding:14px 18px;background:var(--surface2);border-top:1px solid var(--border)}
.total-line{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;font-family:var(--mono);color:var(--muted)}
.total-line.big{font-size:20px;font-weight:800;color:var(--accent);padding-top:10px;margin-top:6px;border-top:1px solid var(--border2);font-family:var(--font)}
.total-line.big span:first-child{color:var(--text)}
.empty{padding:60px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:12px;line-height:1.8}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--text);color:#fff;border-radius:var(--r);padding:11px 16px;font-size:12px;opacity:0;transform:translateY(6px);transition:all .22s;pointer-events:none;font-family:var(--mono);max-width:320px}
#toast.show{opacity:1;transform:translateY(0)}
#config-screen{padding:36px;max-width:580px}
.config-note{background:#d8dff7;border:1px solid #b0bde8;border-radius:var(--r);padding:14px 16px;font-size:12px;color:#1a3280;font-family:var(--mono);margin-bottom:22px;line-height:1.75}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div id="app">
<aside>
  <div class="sidebar-logo">
    <div class="brand">Sistema de gestión</div>
    <div class="name">FERRETERÍA<br><span>PRO</span></div>
  </div>
  <nav>
    <div class="nav-section">Principal</div>
    <a onclick="navigate('dashboard')" id="nav-dashboard">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/></svg>Dashboard
    </a>
    <div class="nav-section">Ventas</div>
    <a onclick="navigate('ventas')" id="nav-ventas">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M3 3h10v9H3z" stroke="currentColor" stroke-width="1.2"/><path d="M6 3V2m4 1V2M3 7h10" stroke="currentColor" stroke-width="1.2"/></svg>Nueva Factura
    </a>
    <a onclick="navigate('historial')" id="nav-historial">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.2"/><path d="M8 5v3l2 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>Historial
    </a>
    <div class="nav-section">Stock</div>
    <a onclick="navigate('inventario')" id="nav-inventario">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><rect x="1" y="4" width="14" height="10" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1M6 9h4M8 7v4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>Inventario
    </a>
    <a onclick="navigate('compras')" id="nav-compras">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M2 2h1.5l2 8h7l1.5-5H5.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="7" cy="13" r="1" fill="currentColor"/><circle cx="12" cy="13" r="1" fill="currentColor"/></svg>Compras
    </a>
    <div class="nav-section">Contactos</div>
    <a onclick="navigate('proveedores')" id="nav-proveedores">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M2 13V7l6-4 6 4v6H2z" stroke="currentColor" stroke-width="1.2"/><path d="M6 13V9h4v4" stroke="currentColor" stroke-width="1.2"/></svg>Proveedores
    </a>
    <div class="nav-section">Sistema</div>
    <a onclick="navigate('config')" id="nav-config">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.2"/><path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M2.9 2.9l1.1 1.1M12 12l1.1 1.1M13.1 2.9L12 4M4 12l-1.1 1.1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>Firebase
    </a>
  </nav>
  <div class="sidebar-footer">v2.0 · FERRETERÍA PRO<br><span id="db-status" style="color:var(--danger)">● Sin conexión</span></div>
</aside>
<main id="main-content">
  <div class="empty" style="margin-top:80px"><div class="spinner"></div><div style="margin-top:12px">Iniciando…</div></div>
</main>
</div>
<div id="toast"></div>
<div id="modal-container"></div>

<script>
// ── STATE ──
let db=null,currentPage='dashboard';
let inventario=[],proveedores=[],facturas=[],compras=[];
let searchQ='',facturaItems=[],facturaCliente={nombre:'',dni:''},facturaDesc=0;
let compraItems=[];
const CATS=['Herramientas manuales','Herramientas eléctricas','Fijaciones','Plomería','Electricidad','Pintura','Maderas','Adhesivos','Seguridad','Otros'];

// ── FIREBASE ──
function initFirebase(cfg){
  try{
    if(firebase.apps.length) firebase.apps.forEach(a=>a.delete());
    firebase.initializeApp(cfg);
    db=firebase.firestore();
    localStorage.setItem('fb_config',JSON.stringify(cfg));
    document.getElementById('db-status').innerHTML='● Conectado';
    document.getElementById('db-status').style.color='var(--success)';
    toast('Firebase conectado ✓');
    navigate('dashboard');
    return true;
  }catch(e){toast('Error: '+e.message);return false;}
}
function checkSavedConfig(){
  const s=localStorage.getItem('fb_config');
  if(s){try{initFirebase(JSON.parse(s));}catch(e){navigate('config');}}
  else navigate('config');
}

// ── NAV ──
function navigate(page){
  currentPage=page;searchQ='';
  document.querySelectorAll('nav a').forEach(a=>a.classList.remove('active'));
  const el=document.getElementById('nav-'+page);
  if(el) el.classList.add('active');
  ({dashboard:renderDashboard,inventario:renderInventario,ventas:renderVentas,historial:renderHistorial,proveedores:renderProveedores,compras:renderCompras,config:renderConfig})[page]?.();
  if(page!=='ventas') detachScannerListener();
}

// ── TOAST / MODAL ──
let toastTimer;
function toast(msg,dur=3000){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),dur);}
function showModal(html){document.getElementById('modal-container').innerHTML=`<div class="modal-backdrop" onclick="closeModal(event)">${html}</div>`;}
function closeModal(e){if(!e||e.target.classList.contains('modal-backdrop'))document.getElementById('modal-container').innerHTML='';}
window.closeModal=closeModal;

// ── UTILS ──
function fmt(n){return new Intl.NumberFormat('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0);}
function fmtInt(n){return new Intl.NumberFormat('es-AR').format(Math.round(n||0));}
function fmtDate(ts,long=false){if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return long?d.toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'}):d.toLocaleDateString('es-AR');}
function newNum(prefix){return prefix+'-'+String(Date.now()).slice(-7);}

// ── LOADERS ──
async function loadInventario(){if(!db)return[];const s=await db.collection('inventario').orderBy('nombre').get();inventario=s.docs.map(d=>({id:d.id,...d.data()}));return inventario;}
async function loadProveedores(){if(!db)return[];const s=await db.collection('proveedores').orderBy('nombre').get();proveedores=s.docs.map(d=>({id:d.id,...d.data()}));return proveedores;}
async function loadFacturas(lim=200){if(!db)return[];const s=await db.collection('facturas').orderBy('fecha','desc').limit(lim).get();facturas=s.docs.map(d=>({id:d.id,...d.data()}));return facturas;}
async function loadCompras(lim=200){if(!db)return[];const s=await db.collection('compras').orderBy('fecha','desc').limit(lim).get();compras=s.docs.map(d=>({id:d.id,...d.data()}));return compras;}

// ══════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════
async function renderDashboard(){
  const main=document.getElementById('main-content');
  if(!db){navigate('config');return;}
  main.innerHTML=`<div class="empty"><div class="spinner"></div></div>`;
  await Promise.all([loadInventario(),loadFacturas(),loadCompras()]);
  const now=new Date(),mes=now.getMonth(),anio=now.getFullYear();
  const factMes=facturas.filter(f=>{const d=f.fecha?.toDate?.();return d&&d.getMonth()===mes&&d.getFullYear()===anio;});
  const mesAnt=mes===0?11:mes-1,anioAnt=mes===0?anio-1:anio;
  const factMesAnt=facturas.filter(f=>{const d=f.fecha?.toDate?.();return d&&d.getMonth()===mesAnt&&d.getFullYear()===anioAnt;});
  const totalMes=factMes.reduce((s,f)=>s+(f.total||0),0);
  const totalMesAnt=factMesAnt.reduce((s,f)=>s+(f.total||0),0);
  const delta=totalMesAnt>0?((totalMes-totalMesAnt)/totalMesAnt*100):0;
  const valorInv=inventario.reduce((s,p)=>s+(p.precio_costo||0)*(p.stock||0),0);
  const stockBajo=inventario.filter(p=>(p.stock||0)<=(p.stock_minimo||0));
  const comprasMes=compras.filter(c=>{const d=c.fecha?.toDate?.();return d&&d.getMonth()===mes&&d.getFullYear()===anio;});
  const totalComprasMes=comprasMes.reduce((s,c)=>s+(c.total||0),0);
  // ventas últimos 14 días
  const ventasDia={};
  for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);ventasDia[d.toLocaleDateString('es-AR')]=0;}
  facturas.forEach(f=>{const k=fmtDate(f.fecha);if(ventasDia[k]!==undefined)ventasDia[k]+=(f.total||0);});
  // top productos
  const prodCount={};
  facturas.forEach(f=>(f.items||[]).forEach(it=>{prodCount[it.nombre]=(prodCount[it.nombre]||0)+it.cantidad;}));
  const topProds=Object.entries(prodCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxTop=topProds[0]?.[1]||1;

  main.innerHTML=`
  <div class="page-header">
    <div><h1>Dashboard</h1><div class="sub">${now.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div></div>
    <button class="btn btn-ghost" onclick="navigate('ventas')">+ Nueva venta</button>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="s-label">Ventas del mes</div><div class="s-val" style="color:var(--accent)">$${fmtInt(totalMes)}</div><div class="s-trend ${delta>=0?'trend-up':'trend-dn'}">${delta>=0?'↑':'↓'} ${Math.abs(delta).toFixed(1)}% vs mes ant.</div></div>
    <div class="stat-card"><div class="s-label">Facturas emitidas</div><div class="s-val">${factMes.length}</div><div class="s-sub">este mes</div></div>
    <div class="stat-card"><div class="s-label">Valor inventario</div><div class="s-val">$${fmtInt(valorInv)}</div><div class="s-sub">${inventario.length} productos</div></div>
    <div class="stat-card"><div class="s-label">Stock crítico</div><div class="s-val" style="color:${stockBajo.length>0?'var(--danger)':'var(--success)'}">${stockBajo.length}</div><div class="s-sub">por reponer</div></div>

async function renderInventario(){
  const main=document.getElementById('main-content');
  main.innerHTML=`<div class="empty"><div class="spinner"></div></div>`;
  if(!db){navigate('config');return;}
  await Promise.all([loadInventario(),loadProveedores()]);
  const filtered=inventario.filter(p=>!searchQ||p.nombre?.toLowerCase().includes(searchQ)||p.codigo?.toLowerCase().includes(searchQ)||p.categoria?.toLowerCase().includes(searchQ));
  const stockBajo=inventario.filter(p=>(p.stock||0)<=(p.stock_minimo||0)).length;
  const valorTotal=inventario.reduce((s,p)=>s+(p.precio_costo||0)*(p.stock||0),0);
  main.innerHTML=`
  <div class="page-header">
    <div><h1>Inventario</h1><div class="sub">${inventario.length} productos</div></div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="exportarInventarioExcel()">↓ Excel</button>
      <button class="btn btn-primary" onclick="modalProducto()">+ Nuevo producto</button>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="s-label">Productos</div><div class="s-val">${inventario.length}</div></div>
    <div class="stat-card"><div class="s-label">Stock crítico</div><div class="s-val" style="color:var(--danger)">${stockBajo}</div></div>
    <div class="stat-card"><div class="s-label">Valor inventario</div><div class="s-val">$${fmtInt(valorTotal)}</div><div class="s-sub">a precio costo</div></div>
  </div>
  <div class="toolbar">
    <div class="search-box">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="var(--muted)" stroke-width="1.2"/><path d="M11 11l3 3" stroke="var(--muted)" stroke-width="1.2" stroke-linecap="round"/></svg>
      <input placeholder="Buscar nombre, código, categoría…" oninput="searchQ=this.value.toLowerCase();renderInventario()" value="${searchQ}" autofocus/>
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Código</th><th>Producto</th><th>Categoría</th><th>Stock</th><th>Mín.</th><th>P. Costo</th><th>P. Venta</th><th>Margen</th><th>Estado</th><th></th></tr></thead>
      <tbody>
        ${filtered.length===0?`<tr><td colspan="10"><div class="empty">Sin resultados</div></td></tr>`:
          filtered.map(p=>{
            const margen=p.precio_costo>0?((p.precio_venta-p.precio_costo)/p.precio_costo*100):0;
            const ec=(p.stock||0)<=(p.stock_minimo||0)?'badge-low':(p.stock||0)<=(p.stock_minimo||0)*1.5?'badge-warn':'badge-ok';
            const el=(p.stock||0)<=(p.stock_minimo||0)?'Bajo':(p.stock||0)<=(p.stock_minimo||0)*1.5?'Mínimo':'OK';
            return`<tr>
              <td class="mono" style="color:var(--muted)">${p.codigo||'—'}</td>
              <td><strong>${p.nombre}</strong>${p.proveedor_nombre?`<br><span style="color:var(--muted);font-size:11px;font-family:var(--mono)">${p.proveedor_nombre}</span>`:''}</td>
              <td style="color:var(--muted);font-size:12px">${p.categoria||'—'}</td>
              <td class="mono" style="font-weight:700">${p.stock||0} <span style="color:var(--muted);font-size:11px">${p.unidad||''}</span></td>
              <td class="mono" style="color:var(--muted)">${p.stock_minimo||0}</td>
              <td class="mono">$${fmt(p.precio_costo)}</td>
              <td class="mono" style="color:var(--accent)">$${fmt(p.precio_venta)}</td>
              <td class="mono" style="color:${margen>30?'var(--success)':margen>10?'var(--accent)':'var(--danger)'}">${margen.toFixed(0)}%</td>
              <td><span class="badge ${ec}">${el}</span></td>

                <button class="btn btn-ghost btn-xs" onclick="modalProducto('${p.id}')">Editar</button>

              </div></td>

          }).join('')}
      </tbody>
    </table>
  </div>`;
}

async function modalProducto(id=null){

  if(id) p=inventario.find(x=>x.id===id)||p;
  showModal(`<div class="modal" onclick="event.stopPropagation()">
    <h2>${id?'Editar':'Nuevo'} producto</h2>
    <div class="form-grid-2">
      <div class="form-group"><label>Código</label><input id="f-cod" value="${p.codigo||''}"/></div>
      <div class="form-group"><label>Unidad</label><select id="f-uni">${['unidad','metro','kg','litro','par','caja','rollo','bolsa'].map(u=>`<option ${p.unidad===u?'selected':''}>${u}</option>`).join('')}</select></div>
    </div>
    <div class="form-group"><label>Nombre del producto *</label><input id="f-nom" value="${p.nombre||''}"/></div>
    <div class="form-grid-2">
      <div class="form-group"><label>Categoría</label><select id="f-cat">${CATS.map(c=>`<option ${p.categoria===c?'selected':''}>${c}</option>`).join('')}</select></div>
      <div class="form-group"><label>Proveedor</label><select id="f-prov"><option value="">— Sin proveedor —</option>${proveedores.map(pv=>`<option value="${pv.id}" ${p.proveedor_id===pv.id?'selected':''}>${pv.nombre}</option>`).join('')}</select></div>
    </div>
    <div class="form-grid-3">
      <div class="form-group"><label>Stock actual</label><input id="f-stk" type="number" min="0" value="${p.stock||0}"/></div>
      <div class="form-group"><label>Stock mínimo</label><input id="f-stk-min" type="number" min="0" value="${p.stock_minimo||0}"/></div>
      <div class="form-group"><label>Ubicación</label><input id="f-ubic" value="${p.ubicacion||''}" placeholder="Ej: A-3"/></div>
    </div>
    <div class="form-grid-2">
      <div class="form-group"><label>Precio costo ($)</label><input id="f-pc" type="number" min="0" step="0.01" value="${p.precio_costo||0}" oninput="calcMargen()"/></div>
      <div class="form-group"><label>Precio venta ($)</label><input id="f-pv" type="number" min="0" step="0.01" value="${p.precio_venta||0}" oninput="calcMargen()"/></div>
    </div>
    <div id="margen-preview" style="font-family:var(--mono);font-size:11px;color:var(--muted);margin:-8px 0 12px"></div>
    <div class="form-group"><label>Descripción</label><textarea id="f-desc" rows="2">${p.descripcion||''}</textarea></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarProducto('${id||''}')">Guardar</button>
    </div>
  </div>`);
  calcMargen();
}
window.modalProducto=modalProducto;

function calcMargen(){
  const pc=+document.getElementById('f-pc')?.value||0;
  const pv=+document.getElementById('f-pv')?.value||0;
  const el=document.getElementById('margen-preview');
  if(!el)return;
  if(pc>0&&pv>0){const m=((pv-pc)/pc*100).toFixed(1);el.textContent=`Margen: ${m}% · Ganancia: $${fmt(pv-pc)} por unidad`;el.style.color=m>30?'var(--success)':m>10?'var(--accent)':'var(--danger)';}
  else el.textContent='';
}
window.calcMargen=calcMargen;

async function guardarProducto(id){
  const g=s=>document.getElementById(s)?.value;
  const ps=document.getElementById('f-prov');
  const pn=ps?.selectedOptions[0]?.text||'';
  const data={codigo:g('f-cod'),nombre:g('f-nom'),categoria:g('f-cat'),unidad:g('f-uni'),proveedor_id:g('f-prov'),proveedor_nombre:pn==='— Sin proveedor —'?'':pn,stock:+g('f-stk'),stock_minimo:+g('f-stk-min'),ubicacion:g('f-ubic'),precio_costo:+g('f-pc'),precio_venta:+g('f-pv'),descripcion:g('f-desc'),updated_at:firebase.firestore.FieldValue.serverTimestamp()};
  if(!data.nombre){toast('El nombre es obligatorio');return;}
  try{
    if(id) await db.collection('inventario').doc(id).update(data);
    else{data.created_at=firebase.firestore.FieldValue.serverTimestamp();await db.collection('inventario').add(data);}
    closeModal();toast(id?'Actualizado ✓':'Agregado ✓');renderInventario();
  }catch(e){toast('Error: '+e.message);}
}
window.guardarProducto=guardarProducto;

async function eliminarProducto(id,nombre){
  if(!confirm(`¿Eliminar "${nombre}"?`))return;
  await db.collection('inventario').doc(id).delete();
  toast('Eliminado');renderInventario();
}
window.eliminarProducto=eliminarProducto;

async function renderVentas(){
  const main=document.getElementById('main-content');
  if(!db){navigate('config');return;}
  main.innerHTML=`<div class="empty"><div class="spinner"></div></div>`;
  await loadInventario();
  facturaItems=[];facturaCliente={nombre:'',dni:''};facturaDesc=0;
  renderFacturaUI();
}

function calcFactura(){
  const subtotal=facturaItems.reduce((s,i)=>s+i.total,0);
  const descAmt=subtotal*(facturaDesc/100);
  const base=subtotal-descAmt;
  const iva=base*0.21;
  const total=base+iva;
  return{subtotal,descAmt,base,iva,total};
}

// ── BARCODE SCANNER ──
// Los lectores de código envían los caracteres del código seguidos de Enter.
// Capturamos keydown globalmente: acumulamos chars rápidos (< 80ms entre teclas)
// y cuando llega Enter con ≥ 3 chars lo tratamos como código escaneado.
let _scanBuf = '', _scanTimer = null;
function attachScannerListener() {
  // Solo activo en la pantalla de ventas
  document.removeEventListener('keydown', _onScanKey);
  document.addEventListener('keydown', _onScanKey);
}
function detachScannerListener() {
  document.removeEventListener('keydown', _onScanKey);
  _scanBuf = '';
}
function _onScanKey(e) {
  // Ignorar si el foco está en un input/select/textarea (el usuario está escribiendo)
  const tag = document.activeElement?.tagName?.toLowerCase();
  if (tag === 'input' || tag === 'select' || tag === 'textarea') {
    // Excepción: el campo de scanner dedicado siempre acepta
    if (document.activeElement?.id !== 'scan-input') return;
  }
  if (e.key === 'Enter') {
    if (_scanBuf.length >= 2) {
      const codigo = _scanBuf.trim();
      _scanBuf = '';
      clearTimeout(_scanTimer);
      procesarCodigo(codigo);
    }
    return;
  }
  if (e.key.length === 1) {
    _scanBuf += e.key;
    clearTimeout(_scanTimer);
    // Si pasan > 100ms sin nueva tecla, resetear (fue teclado manual, no lector)
    _scanTimer = setTimeout(() => { _scanBuf = ''; }, 100);
  }
}

function procesarCodigo(codigo) {
  const prod = inventario.find(p => p.codigo && p.codigo.trim() === codigo.trim());
  if (!prod) {
    flashScanFeedback('error');
    toast(`Código "${codigo}" no encontrado en inventario`);
    return;
  }
  const yaEnLista = facturaItems.filter(i => i.id === prod.id).reduce((s,i) => s + i.cantidad, 0);
  if (yaEnLista >= (prod.stock || 0)) {
    flashScanFeedback('error');
    toast(`Stock insuficiente de "${prod.nombre}"`);
    return;
  }
  // Si ya está en la lista, sumar 1
  const existing = facturaItems.find(i => i.id === prod.id);
  if (existing) {
    existing.cantidad += 1;
    existing.total = existing.cantidad * existing.precio;
  } else {
    facturaItems.push({ id: prod.id, nombre: prod.nombre, unidad: prod.unidad || 'unidad', cantidad: 1, precio: prod.precio_venta || 0, total: prod.precio_venta || 0 });
  }
  flashScanFeedback('ok');
  updateTablaItems();
  updateTotalesUI();
  // Mostrar feedback en el campo scanner
  const si = document.getElementById('scan-input');
  if (si) { si.value = ''; si.placeholder = `✓ ${prod.nombre}`; setTimeout(() => { si.placeholder = 'Escanear o escribir código…'; }, 1500); }
}
window.procesarCodigo = procesarCodigo;

function flashScanFeedback(type) {

  if (!bar) return;
  bar.style.transition = 'background .1s';

}

function cambiarCantidad(i, delta) {
  const it = facturaItems[i]; if (!it) return;
  const prod = inventario.find(p => p.id === it.id);
  const newQty = it.cantidad + delta;
  if (newQty < 1) { quitarItem(i); return; }
  if (prod && newQty > (prod.stock || 0)) { toast(`Stock máximo: ${prod.stock}`); return; }
  it.cantidad = newQty;
  it.total = it.cantidad * it.precio;
  updateTablaItems();
  updateTotalesUI();
}

function agregarItemDesdeSelector() {
  const sel=document.getElementById('add-prod');const opt=sel?.selectedOptions[0];
  if(!opt?.value){toast('Seleccioná un producto');return;}
  const qty=+document.getElementById('add-qty')?.value||1;
  const precio=+document.getElementById('add-precio')?.value||+opt.dataset.precio||0;
  const stock=+opt.dataset.stock;
  const existing = facturaItems.find(i => i.id === opt.value);
  const yaEnLista = existing ? existing.cantidad : 0;
  if(qty+yaEnLista>stock){toast(`Stock insuficiente (disponible: ${stock-yaEnLista})`);return;}
  if (existing) { existing.cantidad += qty; existing.total = existing.cantidad * existing.precio; }
  else facturaItems.push({id:opt.value,nombre:opt.dataset.nombre,unidad:opt.dataset.unidad||'unidad',cantidad:qty,precio,total:qty*precio});
  updateTablaItems(); updateTotalesUI();
  // reset selector
  sel.value=''; document.getElementById('add-qty').value=1; document.getElementById('add-precio').value='';
}
window.agregarItemDesdeSelector=agregarItemDesdeSelector;

// Campo scanner manual
function onScanInputKey(e) {
  if (e.key === 'Enter') {
    const val = e.target.value.trim();
    if (val) { procesarCodigo(val); e.target.value=''; }
  }
}
window.onScanInputKey = onScanInputKey;

function agregarItem(){agregarItemDesdeSelector();}

async function confirmarVenta(nro,subtotal,descAmt,iva,total){
  if(!facturaItems.length)return;
  const cliente={nombre:document.getElementById('cli-nom')?.value||'',dni:document.getElementById('cli-dni')?.value||''};
  const factura={numero:nro,cliente,items:facturaItems,subtotal,descuento:descAmt,iva,total,fecha:firebase.firestore.Timestamp.fromDate(new Date()),created_at:firebase.firestore.FieldValue.serverTimestamp()};
  try{
    const ref=await db.collection('facturas').add(factura);
    const batch=db.batch();
    for(const it of facturaItems) batch.update(db.collection('inventario').doc(it.id),{stock:firebase.firestore.FieldValue.increment(-it.cantidad)});
    await batch.commit();
    toast('Venta confirmada · '+nro+' ✓');
    await loadFacturas();
    imprimirFactura({...factura,id:ref.id});
  }catch(e){toast('Error: '+e.message);}
}
window.confirmarVenta=confirmarVenta;

    <div class="form-group"><label>Nombre / Razón social *</label><input id="p-nom" value="${p.nombre||''}"/></div>
    <div class="form-grid-2">
      <div class="form-group"><label>CUIT</label><input id="p-cuit" value="${p.cuit||''}"/></div>
      <div class="form-group"><label>Persona de contacto</label><input id="p-contacto" value="${p.contacto||''}"/></div>
    </div>
    <div class="form-grid-2">
      <div class="form-group"><label>Teléfono</label><input id="p-tel" value="${p.telefono||''}"/></div>
      <div class="form-group"><label>Email</label><input id="p-email" type="email" value="${p.email||''}"/></div>
    </div>
    <div class="form-grid-2">
      <div class="form-group"><label>Rubro</label><select id="p-cat">${CATS.map(c=>`<option ${p.categoria===c?'selected':''}>${c}</option>`).join('')}</select></div>
      <div class="form-group"><label>Condición de pago</label><select id="p-pago">${['Contado','15 días','30 días','60 días','90 días','A convenir'].map(c=>`<option ${p.condicion_pago===c?'selected':''}>${c}</option>`).join('')}</select></div>
    </div>
    <div class="form-group"><label>Notas</label><textarea id="p-notas" rows="2">${p.notas||''}</textarea></div>

      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>

    </div>
  </div>`);
}
window.modalProveedor=modalProveedor;

async function guardarProveedor(id){
  const g=s=>document.getElementById(s)?.value;
  const data={nombre:g('p-nom'),cuit:g('p-cuit'),contacto:g('p-contacto'),telefono:g('p-tel'),email:g('p-email'),categoria:g('p-cat'),condicion_pago:g('p-pago'),notas:g('p-notas'),updated_at:firebase.firestore.FieldValue.serverTimestamp()};
  if(!data.nombre){toast('El nombre es obligatorio');return;}
  try{
    if(id) await db.collection('proveedores').doc(id).update(data);
    else{data.created_at=firebase.firestore.FieldValue.serverTimestamp();await db.collection('proveedores').add(data);}
    closeModal();toast(id?'Actualizado ✓':'Agregado ✓');renderProveedores();
  }catch(e){toast('Error: '+e.message);}
}
window.guardarProveedor=guardarProveedor;

async function eliminarProveedor(id,nombre){
  if(!confirm(`¿Eliminar "${nombre}"?`))return;
  await db.collection('proveedores').doc(id).delete();
  toast('Eliminado');renderProveedores();
}
window.eliminarProveedor=eliminarProveedor;

// ══════════════════════════════════════════════
// COMPRAS
// ══════════════════════════════════════════════
async function renderCompras(){
  const main=document.getElementById('main-content');
  main.innerHTML=`<div class="empty"><div class="spinner"></div></div>`;
  if(!db){navigate('config');return;}
  await Promise.all([loadCompras(),loadProveedores(),loadInventario()]);
  const filtered=compras.filter(c=>!searchQ||c.numero?.includes(searchQ)||c.proveedor_nombre?.toLowerCase().includes(searchQ));
  const pendientes=compras.filter(c=>c.estado==='Pendiente').length;
  const now=new Date();
  const totalMes=compras.filter(c=>{const d=c.fecha?.toDate?.();return d&&d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).reduce((s,c)=>s+(c.total||0),0);
  main.innerHTML=`
  <div class="page-header">
    <div><h1>Compras</h1><div class="sub">Órdenes a proveedores</div></div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="exportarComprasExcel()">↓ Excel</button>
      <button class="btn btn-primary" onclick="modalNuevaCompra()">+ Nueva orden</button>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="s-label">Órdenes totales</div><div class="s-val">${compras.length}</div></div>
    <div class="stat-card"><div class="s-label">Pendientes</div><div class="s-val" style="color:var(--accent)">${pendientes}</div></div>
    <div class="stat-card"><div class="s-label">Compras del mes</div><div class="s-val" style="color:var(--info)">$${fmtInt(totalMes)}</div></div>
  </div>
  <div class="toolbar">
    <div class="search-box">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="var(--muted)" stroke-width="1.2"/><path d="M11 11l3 3" stroke="var(--muted)" stroke-width="1.2" stroke-linecap="round"/></svg>
      <input placeholder="Buscar número o proveedor…" oninput="searchQ=this.value.toLowerCase();renderCompras()" value="${searchQ}"/>
    </div>
  </div>
  <div class="table-wrap pt">
    <table>
      <thead><tr><th>Nro.</th><th>Fecha</th><th>Proveedor</th><th>Ítems</th><th style="text-align:right">Total</th><th>Estado</th><th></th></tr></thead>
      <tbody>
        ${filtered.length===0?`<tr><td colspan="7"><div class="empty">Sin órdenes de compra</div></td></tr>`:
          filtered.map(c=>{
            const sc=c.estado==='Recibido'?'badge-ok':c.estado==='Cancelado'?'badge-low':'badge-warn';
            return`<tr>
              <td class="mono" style="color:var(--info)">${c.numero}</td>
              <td class="mono">${fmtDate(c.fecha)}</td>
              <td><strong>${c.proveedor_nombre||'—'}</strong>${c.nota?`<br><span style="color:var(--muted);font-size:11px;font-family:var(--mono)">${c.nota}</span>`:''}</td>
              <td class="mono" style="color:var(--muted)">${c.items?.length||0}</td>
              <td style="text-align:right" class="mono" style="font-weight:600">$${fmt(c.total||0)}</td>
              <td><span class="badge ${sc}">${c.estado||'Pendiente'}</span></td>
              <td><div class="action-row">
                <button class="btn btn-ghost btn-xs" onclick="verCompra('${c.id}')">Ver</button>
                ${c.estado==='Pendiente'?`<button class="btn btn-success btn-xs" onclick="recibirCompra('${c.id}')">Recibir</button>`:''}
                ${c.estado==='Pendiente'?`<button class="btn btn-danger btn-xs" onclick="cancelarCompra('${c.id}')">Cancelar</button>`:''}
              </div></td>
            </tr>`;
          }).join('')}
      </tbody>
    </table>
  </div>`;
}

async function modalNuevaCompra(){
  compraItems=[];
  renderModalCompra();
}
window.modalNuevaCompra=modalNuevaCompra;

function renderModalCompra(){
  const total=compraItems.reduce((s,i)=>s+i.total,0);
  showModal(`<div class="modal modal-wide" onclick="event.stopPropagation()">
    <h2>Nueva Orden de Compra</h2>
    <div class="form-grid-2">
      <div class="form-group"><label>Proveedor *</label>
        <select id="oc-prov"><option value="">— Seleccionar —</option>${proveedores.map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('')}</select>
      </div>
      <div class="form-group"><label>Fecha</label><input id="oc-fecha" type="date" value="${new Date().toISOString().slice(0,10)}"/></div>
    </div>
    <div class="form-group"><label>Nota / referencia</label><input id="oc-nota" placeholder="Opcional"/></div>
    <hr style="border:none;border-top:1px solid var(--border);margin:4px 0 16px"/>
    <div style="font-size:10px;color:var(--muted);font-family:var(--mono);letter-spacing:.09em;text-transform:uppercase;margin-bottom:10px">Productos</div>
    <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px">
      <div class="form-group" style="flex:2;min-width:180px;margin-bottom:0"><label>Producto</label>
        <select id="oc-prod" onchange="autoFillOCPrecio()"><option value="">— Seleccionar —</option>${inventario.map(p=>`<option value="${p.id}" data-nombre="${p.nombre}" data-pc="${p.precio_costo}">${p.nombre}</option>`).join('')}</select>
      </div>
      <div class="form-group" style="width:80px;margin-bottom:0"><label>Cantidad</label><input id="oc-qty" type="number" min="1" value="1"/></div>
      <div class="form-group" style="width:130px;margin-bottom:0"><label>P. costo ($)</label><input id="oc-pc" type="number" min="0" step="0.01" placeholder="0.00"/></div>
      <button class="btn btn-ghost" style="margin-top:18px" onclick="agregarItemCompra()">+ Agregar</button>
    </div>
    ${compraItems.length>0?`
    <table style="width:100%;margin-bottom:12px">
      <thead><tr>
        <th style="font-size:10px;font-family:var(--mono);color:var(--muted);padding:6px 8px;text-align:left">Producto</th>
        <th style="font-size:10px;font-family:var(--mono);color:var(--muted);padding:6px 8px;text-align:right">Cant.</th>
        <th style="font-size:10px;font-family:var(--mono);color:var(--muted);padding:6px 8px;text-align:right">P. Costo</th>
        <th style="font-size:10px;font-family:var(--mono);color:var(--muted);padding:6px 8px;text-align:right">Total</th>
        <th></th>
      </tr></thead>
      <tbody>${compraItems.map((it,i)=>`<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:7px 8px">${it.nombre}</td>
        <td style="padding:7px 8px;text-align:right;font-family:var(--mono)">${it.cantidad}</td>
        <td style="padding:7px 8px;text-align:right;font-family:var(--mono)">$${fmt(it.precio_costo)}</td>
        <td style="padding:7px 8px;text-align:right;font-family:var(--mono);font-weight:600">$${fmt(it.total)}</td>
        <td style="padding:7px 8px"><button class="btn btn-ghost btn-xs" onclick="quitarItemCompra(${i})">✕</button></td>
      </tr>`).join('')}</tbody>
    </table>
    <div style="text-align:right;font-size:15px;font-weight:700;font-family:var(--mono);color:var(--info);padding-right:8px;margin-bottom:4px">Total: $${fmt(total)}</div>`
    :'<div style="color:var(--muted);font-family:var(--mono);font-size:12px;padding:8px 0">Sin ítems aún</div>'}
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarCompra()" ${compraItems.length===0?'disabled':''}>Confirmar orden</button>
    </div>
  </div>`);
}

function autoFillOCPrecio(){const sel=document.getElementById('oc-prod');const opt=sel?.selectedOptions[0];if(opt?.dataset.pc)document.getElementById('oc-pc').value=opt.dataset.pc;}
window.autoFillOCPrecio=autoFillOCPrecio;

function agregarItemCompra(){
  const sel=document.getElementById('oc-prod');const opt=sel?.selectedOptions[0];
  if(!opt?.value){toast('Seleccioná un producto');return;}
  const qty=+document.getElementById('oc-qty')?.value||1;
  const pc=+document.getElementById('oc-pc')?.value||+opt.dataset.pc||0;
  compraItems.push({id:opt.value,nombre:opt.dataset.nombre,cantidad:qty,precio_costo:pc,total:qty*pc});
  renderModalCompra();
}
window.agregarItemCompra=agregarItemCompra;
function quitarItemCompra(i){compraItems.splice(i,1);renderModalCompra();}
window.quitarItemCompra=quitarItemCompra;

async function guardarCompra(){
  const ps=document.getElementById('oc-prov');
  const provId=ps?.value;const provNombre=ps?.selectedOptions[0]?.text||'';
  if(!provId){toast('Seleccioná un proveedor');return;}
  if(!compraItems.length){toast('Agregá al menos un ítem');return;}
  const total=compraItems.reduce((s,i)=>s+i.total,0);
  const data={numero:newNum('OC'),proveedor_id:provId,proveedor_nombre:provNombre,items:compraItems,total,estado:'Pendiente',nota:document.getElementById('oc-nota')?.value||'',fecha:firebase.firestore.Timestamp.fromDate(new Date()),created_at:firebase.firestore.FieldValue.serverTimestamp()};
  try{await db.collection('compras').add(data);closeModal();toast('Orden creada ✓');renderCompras();}
  catch(e){toast('Error: '+e.message);}
}
window.guardarCompra=guardarCompra;

async function recibirCompra(id){
  const c=compras.find(x=>x.id===id);if(!c)return;
  if(!confirm(`¿Marcar ${c.numero} como RECIBIDA?\nEsto actualizará el stock.`))return;
  try{
    const batch=db.batch();
    batch.update(db.collection('compras').doc(id),{estado:'Recibido',recibido_at:firebase.firestore.FieldValue.serverTimestamp()});
    for(const it of(c.items||[])){
      const ref=db.collection('inventario').doc(it.id);
      const updates={stock:firebase.firestore.FieldValue.increment(it.cantidad)};
      if(it.precio_costo>0) updates.precio_costo=it.precio_costo;
      batch.update(ref,updates);
    }
    await batch.commit();
    toast('Recibido · stock actualizado ✓');renderCompras();
  }catch(e){toast('Error: '+e.message);}
}
window.recibirCompra=recibirCompra;

async function cancelarCompra(id){
  const c=compras.find(x=>x.id===id);if(!c)return;
  if(!confirm(`¿Cancelar orden ${c.numero}?`))return;
  await db.collection('compras').doc(id).update({estado:'Cancelado'});
  toast('Cancelada');renderCompras();
}
window.cancelarCompra=cancelarCompra;

function verCompra(id){
  const c=compras.find(x=>x.id===id);if(!c)return;
  const sc=c.estado==='Recibido'?'badge-ok':c.estado==='Cancelado'?'badge-low':'badge-warn';
  showModal(`<div class="modal modal-wide" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
      <div><div style="font-family:var(--mono);font-size:10px;color:var(--muted)">ORDEN DE COMPRA</div><div style="font-size:20px;font-weight:800;color:var(--info)">${c.numero}</div></div>
      <div style="text-align:right"><span class="badge ${sc}" style="font-size:12px">${c.estado}</span><div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px">${fmtDate(c.fecha,true)}</div></div>
    </div>
    <div style="background:var(--surface2);border-radius:var(--r);padding:12px 14px;margin-bottom:16px">
      <div style="font-size:10px;color:var(--muted);font-family:var(--mono);margin-bottom:4px">PROVEEDOR</div>
      <div style="font-weight:600">${c.proveedor_nombre||'—'}</div>
      ${c.nota?`<div style="color:var(--muted);font-size:12px;font-family:var(--mono);margin-top:4px">${c.nota}</div>`:''}
    </div>
    <table style="width:100%;margin-bottom:14px">
      <thead><tr>
        <th style="text-align:left;padding:6px 10px;font-size:10px;font-family:var(--mono);color:var(--muted)">Producto</th>
        <th style="text-align:right;padding:6px 10px;font-size:10px;font-family:var(--mono);color:var(--muted)">Cant.</th>
        <th style="text-align:right;padding:6px 10px;font-size:10px;font-family:var(--mono);color:var(--muted)">P. Costo</th>
        <th style="text-align:right;padding:6px 10px;font-size:10px;font-family:var(--mono);color:var(--muted)">Total</th>
      </tr></thead>
      <tbody>${(c.items||[]).map(it=>`<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:8px 10px">${it.nombre}</td>
        <td style="text-align:right;padding:8px 10px;font-family:var(--mono)">${it.cantidad}</td>
        <td style="text-align:right;padding:8px 10px;font-family:var(--mono)">$${fmt(it.precio_costo)}</td>
        <td style="text-align:right;padding:8px 10px;font-family:var(--mono);font-weight:600">$${fmt(it.total)}</td>
      </tr>`).join('')}</tbody>
    </table>
    <div style="text-align:right;font-size:16px;font-weight:800;color:var(--info);padding-right:10px">Total: $${fmt(c.total||0)}</div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
      ${c.estado==='Pendiente'?`<button class="btn btn-success" onclick="closeModal();recibirCompra('${c.id}')">Marcar como recibido</button>`:''}
    </div>
  </div>`);
}
window.verCompra=verCompra;

    <div class="form-group"><label>API Key</label><input id="cfg-key" value="${cfg.apiKey||''}"/></div>
    <div class="form-grid-2">

    </div>
    <div class="form-grid-2">
      <div class="form-group"><label>Storage Bucket</label><input id="cfg-sto" value="${cfg.storageBucket||''}" placeholder="tu-proyecto.appspot.com"/></div>
      <div class="form-group"><label>Messaging Sender ID</label><input id="cfg-msg" value="${cfg.messagingSenderId||''}"/></div>
    </div>
    <div class="form-group"><label>App ID</label><input id="cfg-app" value="${cfg.appId||''}"/></div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn btn-primary" onclick="conectarFirebase()">Conectar</button>
      ${saved?`<button class="btn btn-danger" onclick="limpiarConfig()">Desconectar</button>`:''}
    </div>
    <div style="margin-top:28px;padding-top:22px;border-top:1px solid var(--border)">
      <div style="font-size:10px;font-family:var(--mono);color:var(--muted);margin-bottom:10px;letter-spacing:.09em;text-transform:uppercase">Reglas Firestore (desarrollo)</div>
      <pre style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px;font-size:11px;font-family:var(--mono);color:var(--muted);overflow-x:auto;line-height:1.8">rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /{document=**} {
      allow read, write: if true;
    }
  }
}</pre>
      <div style="margin-top:14px;padding:12px 14px;background:var(--surface2);border-radius:var(--r);border:1px solid var(--border);font-size:11px;font-family:var(--mono);color:var(--muted);line-height:1.8">

        <span style="color:var(--text)">inventario</span> · <span style="color:var(--text)">proveedores</span> · <span style="color:var(--text)">facturas</span> · <span style="color:var(--text)">compras</span>
      </div>
    </div>

}

function conectarFirebase(){
  const g=id=>document.getElementById(id)?.value.trim();
  const cfg={apiKey:g('cfg-key'),authDomain:g('cfg-auth'),projectId:g('cfg-proj'),storageBucket:g('cfg-sto'),messagingSenderId:g('cfg-msg'),appId:g('cfg-app')};
  if(!cfg.apiKey||!cfg.projectId){toast('API Key y Project ID son obligatorios');return;}
  initFirebase(cfg);
}
window.conectarFirebase=conectarFirebase;

function limpiarConfig(){
  if(!confirm('¿Desconectar Firebase?'))return;
  localStorage.removeItem('fb_config');db=null;
  document.getElementById('db-status').innerHTML='● Sin conexión';
  document.getElementById('db-status').style.color='var(--danger)';
  toast('Desconectado');renderConfig();
}
window.limpiarConfig=limpiarConfig;

// ── INIT ──
checkSavedConfig();
</script>
